name: templa Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            platform: windows-x64
            ext: ".exe"
          - os: macos-latest
            platform: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout templa
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Download the latest tauraroc release for this platform.
      # -------------------------------------------------------
      - name: Download latest tauraroc
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="tauraroc-${{ matrix.platform }}.zip"

          TAG=$(gh release view \
                  --repo tauraro/tauraro \
                  --json tagName \
                  -q '.tagName' 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "error: could not determine latest tauraroc release tag"
            exit 1
          fi
          echo "Latest tauraroc: $TAG"

          mkdir -p tauraroc-dl/
          gh release download "$TAG" \
            --repo tauraro/tauraro \
            --pattern "$ZIP" \
            --dir tauraroc-dl/ \
            --clobber

          mkdir -p tauraroc-install/
          if unzip -oq "tauraroc-dl/$ZIP" -d tauraroc-install/ 2>/dev/null; then
            echo "==> Extracted with unzip"
          else
            echo "==> unzip failed, trying PowerShell Expand-Archive..."
            powershell -Command "Expand-Archive -Force \
              -Path 'tauraroc-dl/$ZIP' \
              -DestinationPath 'tauraroc-install/'"
          fi

          BIN=$(find tauraroc-install -name "tauraroc${{ matrix.ext }}" \
                  ! -path "*/src/*" | head -1)
          if [ -z "$BIN" ]; then
            echo "error: tauraroc${{ matrix.ext }} not found in $ZIP"
            exit 1
          fi
          chmod +x "$BIN" 2>/dev/null || true

          BIN_DIR=$(dirname "$BIN")
          RT_DIR="$(pwd)/$BIN_DIR/runtime"

          if [ "$RUNNER_OS" = "Windows" ]; then
            TAURAROC=$(cygpath -w "$BIN")
            TAURAROC_RT=$(cygpath -w "$RT_DIR")
          else
            TAURAROC="$(pwd)/$BIN"
            TAURAROC_RT="$RT_DIR"
          fi

          echo "TAURAROC=$TAURAROC"       >> "$GITHUB_ENV"
          echo "TAURAROC_RT=$TAURAROC_RT" >> "$GITHUB_ENV"
          echo "Using tauraroc: $TAURAROC"
          echo "Runtime dir:    $TAURAROC_RT"

      # -------------------------------------------------------
      # Build directly: v0.0.5 tauraroc finds its own runtime
      # header and std/ relative to its install dir, and invokes
      # the C compiler itself. A bare `-o name` places the binary
      # in the CWD (repo root). No --emit c / manual GCC needed.
      # -------------------------------------------------------
      - name: Build templa
        shell: bash
        run: |
          "$TAURAROC" src/main.tr -o "templa${{ matrix.ext }}"
          echo "Built: templa${{ matrix.ext }}"

      - name: Verify binary
        shell: bash
        run: |
          echo "==> Binary: $(ls -lh templa${{ matrix.ext }})"
          # Run the built-in self-tests — all 13 must pass
          "./templa${{ matrix.ext }}" --test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: templa-${{ matrix.platform }}
          path: templa${{ matrix.ext }}

  # -----------------------------------------------------------------
  # Release: triggered only on v* tag pushes after all builds pass.
  # -----------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: templa-linux-x64
          path: release/linux-x64/

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: templa-linux-arm64
          path: release/linux-arm64/

      - name: Download windows-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: templa-windows-x64
          path: release/windows-x64/

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: templa-macos-arm64
          path: release/macos-arm64/

      - name: Create release zips
        run: |
          mkdir -p release/assets
          zip -j release/assets/templa-linux-x64.zip   release/linux-x64/templa
          zip -j release/assets/templa-linux-arm64.zip release/linux-arm64/templa
          zip -j release/assets/templa-windows-x64.zip release/windows-x64/templa.exe
          zip -j release/assets/templa-macos-arm64.zip release/macos-arm64/templa

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "templa ${{ github.ref_name }}" \
            --generate-notes \
            release/assets/templa-linux-x64.zip \
            release/assets/templa-linux-arm64.zip \
            release/assets/templa-windows-x64.zip \
            release/assets/templa-macos-arm64.zip
